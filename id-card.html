<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>VISITOR.ID — COMPACT</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=VT323&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
:root{
  --g:#d96a0e; --g2:rgba(217,106,14,0.7); --g3:rgba(217,106,14,0.4); --g4:rgba(217,106,14,0.14);
  --acc:#ff7e00; --pnl:#000000; --bd:#d96a0e; --amb:#ffb000; --red:#ff3b1f;
  --mono:'IBM Plex Mono',monospace; --term:'VT323',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000000;font-family:var(--mono);}

.card{width:100%;height:100%;display:flex;flex-direction:column;background:var(--pnl);position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;inset:0;z-index:20;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent 0,transparent 3px,rgba(0,0,0,.05) 3px,rgba(0,0,0,.05) 4px);}

/* header */
.hdr{flex-shrink:0;height:18px;display:flex;align-items:center;background:#d96a0e;color:#000;
  border-bottom:1px solid rgba(0,0,0,.2);}
.hdr .arr{padding:0 5px 0 6px;font-size:8px;opacity:.6;}
.hdr .nm{font-size:8px;letter-spacing:1.5px;font-weight:600;}
.hdr .badge{margin-left:7px;font-size:6px;letter-spacing:.5px;opacity:.8;display:flex;align-items:center;gap:3px;}
.hdr .bdot{width:4px;height:4px;border-radius:50%;background:#000;animation:blink 1.3s step-end infinite;}
.hdr .live{margin-left:auto;display:flex;align-items:center;gap:4px;font-size:6px;letter-spacing:1px;padding-right:6px;}
.hdr .live i{width:4px;height:4px;border-radius:50%;background:#000;animation:blink 1.6s step-end infinite;}

/* body: avatar left-aligned, text fills the remaining right space */
.body{flex:1;display:flex;flex-direction:column;min-height:0;padding:6px 8px;gap:6px;
  overflow:hidden;position:relative;z-index:5;justify-content:space-between;}
.top{display:flex;gap:8px;align-items:flex-start;}
.photo{position:relative;width:100%;flex-shrink:0;}
.photo canvas{width:100%;height:auto;display:block;border:1px solid var(--g4);}
.photo .pc{position:absolute;width:8px;height:8px;z-index:3;}
.photo .pc.tl{top:2px;left:2px;border-top:1px solid var(--g);border-left:1px solid var(--g);}
.photo .pc.tr{top:2px;right:2px;border-top:1px solid var(--g);border-right:1px solid var(--g);}
.photo .pc.bl{bottom:2px;left:2px;border-bottom:1px solid var(--g);border-left:1px solid var(--g);}
.photo .pc.br{bottom:2px;right:2px;border-bottom:1px solid var(--g);border-right:1px solid var(--g);}
.photo .ptag{position:absolute;bottom:2px;left:4px;z-index:3;font-size:5px;color:var(--g3);letter-spacing:1px;}
.ident{min-width:0;display:flex;flex-direction:column;gap:1px;}
.sys{display:flex;flex-direction:column;gap:1px;}
.slabel{display:flex;align-items:center;gap:6px;font-size:6.5px;color:var(--g3);
  letter-spacing:1.5px;text-transform:uppercase;margin:0 0 2px;}
.slabel::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--g4),transparent);}
.irow{display:flex;justify-content:space-between;align-items:baseline;
  font-size:9px;color:var(--g3);letter-spacing:.3px;padding:2.5px 0;
  border-bottom:1px solid rgba(217,106,14,.06);}
.irow span{opacity:.8;}
.irow b{font-weight:400;color:var(--g);}
.irow b.g{color:var(--acc);} .irow b.y{color:var(--amb);} .irow b.r{color:var(--red);}
.bar{height:4px;background:rgba(217,106,14,.08);border:1px solid var(--g4);margin:1px 0 3px;}
.bar i{display:block;height:100%;background:var(--g);transition:width .9s ease,background .3s;}

/* footer */
.ftr{flex-shrink:0;height:18px;display:flex;align-items:center;gap:6px;padding:0 6px;
  border-top:1px solid var(--g4);background:rgba(217,106,14,.03);}
.ftr canvas{flex:1;height:11px;display:block;}
.ftr .date{font-size:6px;color:var(--g3);letter-spacing:.5px;flex-shrink:0;}

@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
</style>
</head>
<body>
<div class="card">
  <div class="body">
    <div class="photo">
      <canvas id="c1" width="152" height="80"></canvas>
      <span class="pc tl"></span><span class="pc tr"></span><span class="pc bl"></span><span class="pc br"></span>
      <span class="ptag">&#9654; ID-PHOTO</span>
    </div>
    <div class="ident">
      <div class="slabel">IDENTITY</div>
      <div class="irow"><span>NAME</span><b id="v-name">UNKNOWN</b></div>
      <div class="irow"><span>ID</span><b id="v-id">VIS-2026-###</b></div>
      <div class="irow"><span>ROLE</span><b id="v-role">OBSERVER</b></div>
      <div class="irow"><span>CLR</span><b class="g" id="v-clr">GUEST</b></div>
    </div>
    <div class="sys">
      <div class="slabel">SYS MONITOR</div>
      <div class="irow"><span>STATUS</span><b class="g" id="v-status">&#9679; ACTIVE</b></div>
      <div class="irow"><span>INTEG</span><b id="v-intval">98.7%</b></div>
      <div class="bar"><i id="v-intbar" style="width:98.7%"></i></div>
      <div class="irow"><span>THREAT</span><b class="g" id="v-threat">&#9673; LOW</b></div>
      <div class="irow"><span>PKT/s</span><b id="v-pkt">0000</b></div>
    </div>
  </div>
  <div class="ftr">
    <canvas id="bc1" width="180" height="14"></canvas>
    <span class="date" id="v-now">2026.01.01</span>
  </div>
</div>

<script>
setTimeout(() => {

// ── AVATAR BUST + BARCODE ──
(function(){
  const c = document.getElementById('c1');
  const ctx = c.getContext('2d');
  const W = c.width, H = c.height;
  let tick = 0;
  const S = 0.52, hcx = W/2, hcy = 34, BOT = (H - hcy)/S;

  const bc = document.getElementById('bc1');
  const bctx = bc.getContext('2d');
  const BW = bc.width, BH = bc.height;
  const bars = Array.from({length:60}, () => ({w:Math.random()>0.55?2:1, h:BH*(0.5+Math.random()*0.5)}));

  const particles = Array.from({length:26}, () => {
    const a = Math.random()*Math.PI*2;
    return {r:18+Math.random()*24, a, spd:(Math.random()-0.5)*0.013, sz:0.4+Math.random()*1.0, lf:Math.random(), lit:Math.cos(a)>0};
  });

  function headPath(){ctx.beginPath();ctx.moveTo(0,42);ctx.bezierCurveTo(-24,36,-30,14,-27,-6);ctx.bezierCurveTo(-25,-22,-16,-34,-10,-38);ctx.bezierCurveTo(-4,-41,4,-41,10,-38);ctx.bezierCurveTo(16,-34,25,-22,27,-6);ctx.bezierCurveTo(30,14,24,36,0,42);ctx.closePath();}
  function hairPath(){ctx.beginPath();ctx.moveTo(-24,-12);ctx.bezierCurveTo(-29,-40,-15,-58,0,-61);ctx.bezierCurveTo(15,-58,29,-40,24,-12);ctx.bezierCurveTo(18,-38,6,-47,0,-47);ctx.bezierCurveTo(-6,-47,-18,-38,-24,-12);ctx.closePath();}

  function drawBust(pulse){
    ctx.save(); ctx.translate(hcx,hcy); ctx.scale(S,S);
    ctx.shadowColor='#d96a0e'; ctx.shadowBlur=8; ctx.fillStyle='rgba(20,10,0,1)'; hairPath(); ctx.fill();
    ctx.save(); hairPath(); ctx.clip();
    const hl=ctx.createRadialGradient(14,-48,0,14,-48,36); hl.addColorStop(0,'rgba(110,50,0,0.65)'); hl.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=hl; ctx.fillRect(-8,-68,55,62); ctx.restore();
    ctx.shadowBlur=12; ctx.fillStyle='rgba(18,9,0,0.98)'; headPath(); ctx.fill();
    ctx.save(); headPath(); ctx.clip();
    const ml=ctx.createRadialGradient(20,-25,0,20,-25,72);
    ml.addColorStop(0,'rgba(170,80,0,0.85)'); ml.addColorStop(0.28,'rgba(110,50,0,0.55)'); ml.addColorStop(0.58,'rgba(50,24,0,0.22)'); ml.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=ml; ctx.fillRect(-35,-52,80,105); ctx.restore();
    ctx.save(); headPath(); ctx.clip();
    const rl=ctx.createLinearGradient(-32,0,-8,0); rl.addColorStop(0,`rgba(255,140,0,${0.52*pulse})`); rl.addColorStop(0.45,'rgba(160,75,0,0.18)'); rl.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=rl; ctx.fillRect(-36,-52,30,105); ctx.restore();
    ctx.save(); headPath(); ctx.clip();
    const cs=ctx.createLinearGradient(0,28,0,44); cs.addColorStop(0,'rgba(0,0,0,0)'); cs.addColorStop(1,'rgba(0,0,0,0.55)');
    ctx.fillStyle=cs; ctx.fillRect(-35,24,70,24); ctx.restore();
    ctx.shadowBlur=4; ctx.strokeStyle='rgba(100,46,0,0.38)'; ctx.lineWidth=1.2; headPath(); ctx.stroke();
    ctx.shadowBlur=10; ctx.strokeStyle=`rgba(255,140,0,${0.65*pulse})`; ctx.lineWidth=1.8;
    ctx.beginPath(); ctx.moveTo(10,-38); ctx.bezierCurveTo(16,-34,25,-22,27,-6); ctx.bezierCurveTo(30,14,24,36,0,42); ctx.stroke();
    ctx.lineCap='round'; ctx.shadowBlur=6; ctx.strokeStyle=`rgba(230,120,0,${0.72*pulse})`; ctx.lineWidth=1.6;
    ctx.beginPath(); ctx.moveTo(5,-18); ctx.quadraticCurveTo(13,-22,20,-17); ctx.stroke();
    ctx.strokeStyle='rgba(140,65,0,0.45)'; ctx.lineWidth=1.4; ctx.beginPath(); ctx.moveTo(-20,-17); ctx.quadraticCurveTo(-13,-22,-5,-18); ctx.stroke();
    ctx.shadowBlur=7; ctx.fillStyle='rgba(170,80,0,0.72)'; ctx.beginPath(); ctx.ellipse(-12,-9,5.5,3.8,0,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=14; ctx.fillStyle=`rgba(255,140,0,${0.92+Math.sin(tick*0.03)*0.06})`; ctx.beginPath(); ctx.ellipse(12,-9,5.5,3.8,0,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0; ctx.fillStyle='rgba(255,220,180,0.65)'; ctx.beginPath(); ctx.ellipse(14,-11,1.6,1.1,-0.3,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=2; ctx.strokeStyle='rgba(160,75,0,0.28)'; ctx.lineWidth=0.9; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(-1,-2); ctx.lineTo(-3,8); ctx.bezierCurveTo(-3,12,3,12,3,8); ctx.lineTo(1,-2); ctx.stroke();
    ctx.shadowBlur=5;
    const ng=ctx.createLinearGradient(-13,0,13,0); ng.addColorStop(0,'rgba(10,5,0,0.96)'); ng.addColorStop(0.65,'rgba(48,22,0,0.92)'); ng.addColorStop(1,'rgba(28,14,0,0.94)');
    ctx.fillStyle=ng; ctx.beginPath(); ctx.moveTo(-9,43); ctx.lineTo(9,43); ctx.lineTo(12,62); ctx.lineTo(-12,62); ctx.closePath(); ctx.fill();
    ctx.shadowBlur=10*pulse;
    const shg=ctx.createLinearGradient(-78,0,78,0); shg.addColorStop(0,'rgba(8,4,0,0.96)'); shg.addColorStop(0.42,'rgba(18,9,0,0.96)'); shg.addColorStop(0.62,'rgba(58,28,0,0.92)'); shg.addColorStop(1,'rgba(28,14,0,0.94)');
    ctx.fillStyle=shg; ctx.beginPath(); ctx.moveTo(-13,62); ctx.lineTo(13,62); ctx.lineTo(78,BOT+2); ctx.lineTo(-78,BOT+2); ctx.closePath(); ctx.fill();
    ctx.strokeStyle=`rgba(255,140,0,${0.48*pulse})`; ctx.lineWidth=1.5; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.moveTo(13,62); ctx.bezierCurveTo(36,66,60,78,78,BOT+2); ctx.stroke();
    ctx.strokeStyle='rgba(100,46,0,0.3)'; ctx.lineWidth=1.2; ctx.shadowBlur=3;
    ctx.beginPath(); ctx.moveTo(-13,62); ctx.bezierCurveTo(-36,66,-60,78,-78,BOT+2); ctx.stroke();
    ctx.restore();
  }
  function drawBarcode(t){
    bctx.fillStyle='#000'; bctx.fillRect(0,0,BW,BH);
    let x=1;
    bars.forEach(b=>{ bctx.fillStyle=Math.random()>0.97?'#ff9a55':'#d96a0e'; bctx.fillRect(x,(BH-b.h)/2,b.w,b.h); x+=b.w+1; });
    const sp=((t*0.7)%(BW+10))-5; const sg=bctx.createLinearGradient(sp-4,0,sp+4,0);
    sg.addColorStop(0,'rgba(217,106,14,0)'); sg.addColorStop(0.5,'rgba(217,106,14,0.6)'); sg.addColorStop(1,'rgba(217,106,14,0)');
    bctx.fillStyle=sg; bctx.fillRect(sp-4,0,8,BH);
  }
  function draw(){
    ctx.fillStyle='rgba(0,0,0,0.22)'; ctx.fillRect(0,0,W,H);
    const pulse=0.9+Math.sin(tick*0.035)*0.1;
    particles.forEach(p=>{ p.a+=p.spd; p.lf=(p.lf+0.008)%1;
      const px=hcx+Math.cos(p.a)*p.r, py=hcy+Math.sin(p.a)*p.r*0.52, al=Math.sin(p.lf*Math.PI)*(p.lit?0.6:0.26);
      ctx.save(); ctx.shadowColor='#d96a0e'; ctx.shadowBlur=p.lit?4:1;
      ctx.fillStyle=`rgba(0,${p.lit?255:150},${p.lit?80:40},${al})`; ctx.beginPath(); ctx.arc(px,py,p.sz*(p.lit?1:0.65),0,Math.PI*2); ctx.fill(); ctx.restore();
    });
    drawBust(pulse);
    ctx.fillStyle='rgba(0,0,0,0.09)'; for(let y=0;y<H;y+=2) ctx.fillRect(0,y,W,1);
    const sy=(tick*1.4)%(H+8)-4; const sweepG=ctx.createLinearGradient(0,sy-5,0,sy+5);
    sweepG.addColorStop(0,'rgba(217,106,14,0)'); sweepG.addColorStop(0.5,'rgba(217,106,14,0.1)'); sweepG.addColorStop(1,'rgba(217,106,14,0)');
    ctx.fillStyle=sweepG; ctx.fillRect(0,sy-5,W,10);
    const bk=7; ctx.strokeStyle='rgba(217,106,14,0.5)'; ctx.lineWidth=1.2;
    [[0,0,1,1],[W,0,-1,1],[0,H,1,-1],[W,H,-1,-1]].forEach(([x,y,sx,sy2])=>{ ctx.beginPath(); ctx.moveTo(x+sx*bk,y); ctx.lineTo(x,y); ctx.lineTo(x,y+sy2*bk); ctx.stroke(); });
    ctx.font="5px 'Press Start 2P',monospace"; ctx.fillStyle=tick%30<20?'#d96a0e':'#4a2610'; ctx.textAlign='right'; ctx.fillText('SCAN:OK',W-4,H-4);
    drawBarcode(tick);
    tick++;
  }
  const now=new Date();
  document.getElementById('v-now').textContent=`${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;
  setInterval(draw,40);
})();

// ── DYNAMIC IDENTITY ──
(function(){
  const CHARS='ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%&*?><';
  const rndStr=n=>Array.from({length:n},()=>CHARS[Math.floor(Math.random()*CHARS.length)]).join('');
  function glitch(el,fv,rounds,interval){let i=0;const orig=el.style.color;const t=setInterval(()=>{el.textContent=rndStr(fv.length);el.style.color='#ff9a55';i++;if(i>=rounds){clearInterval(t);el.textContent=fv;el.style.color=orig;}},interval);}
  const nameEl=document.getElementById('v-name'); setInterval(()=>glitch(nameEl,'UNKNOWN',6,60),4700);
  const idEl=document.getElementById('v-id'); const sfx=['###','4A2','F91','??7','C0D','E38']; let ii=0;
  setInterval(()=>{ii=(ii+1)%sfx.length; glitch(idEl,`VIS-2026-${sfx[ii]}`,8,50);},3200);
  const roleEl=document.getElementById('v-role'); const roles=['OBSERVER','VISITOR','UNKNOWN','ANALYST','SUBJECT']; let ri=0;
  setInterval(()=>{ri=(ri+1)%roles.length; glitch(roleEl,roles[ri],7,55);},5800);
  const clrEl=document.getElementById('v-clr'); let cb=true;
  setInterval(()=>{cb=!cb; clrEl.style.color=cb?'#d96a0e':'rgba(217,106,14,0.3)';},900);
})();

// ── SYS MONITOR ──
(function(){
  let anomaly=false;
  const intval=document.getElementById('v-intval'), intbar=document.getElementById('v-intbar');
  const threat=document.getElementById('v-threat'), pkt=document.getElementById('v-pkt'), status=document.getElementById('v-status');
  let integrity=98.7, p=0;
  setInterval(()=>{ p=(p+Math.floor(Math.random()*280+80))%10000; pkt.textContent=String(p).padStart(4,'0'); },75);
  function up(){
    if(anomaly) return;
    integrity+=(Math.random()-0.48)*0.35; integrity=Math.min(99.9,Math.max(95.5,integrity));
    intval.textContent=integrity.toFixed(1)+'%'; intval.style.color=''; intbar.style.width=integrity+'%'; intbar.style.background='#d96a0e';
    threat.textContent='◉ LOW'; threat.style.color='#d96a0e';
    status.textContent='● ACTIVE'; status.style.color='#d96a0e';
    if(Math.random()<0.008) anom();
  }
  function anom(){
    anomaly=true; const target=58+Math.random()*20; let cur=integrity, step=0;
    const d=setInterval(()=>{ step++; cur+=(target-cur)*0.28;
      intval.textContent=cur.toFixed(1)+'%'; intval.style.color=cur<70?'#ff3b1f':'#ffb000';
      intbar.style.width=cur+'%'; intbar.style.background=cur<70?'#ff3b1f':'#ffb000';
      if(step>=10){ clearInterval(d); integrity=cur;
        threat.textContent=cur<70?'◉ HIGH':'◉ MED'; threat.style.color=cur<70?'#ff3b1f':'#ffb000';
        status.textContent='⚠ ANOMALY'; status.style.color='#ff3b1f';
        setTimeout(()=>{ integrity=96+Math.random()*3.5; anomaly=false; },2400+Math.random()*1000);
      }
    },90);
  }
  setInterval(up,550);
})();

}, 400);
</script>
</body>
</html>
