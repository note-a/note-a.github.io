<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SET-OS — Wireframe Reference</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  width:100%;height:100%;
  background:#111;
  font-family:'Courier New',monospace;
  color:#ccc;
  overflow:hidden;
}

/* ── 전체 프레임: 화면 80% 가운데 정렬 ── */
#frame{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:88%;height:88%;
  display:flex;
  border:1px solid #2a2a2a;
  border-radius:4px;
  overflow:hidden;
  box-shadow:0 0 0 1px #1a1a1a, 0 20px 80px rgba(0,0,0,.8);
}

/* ── 왼쪽 사이드바 ── */
#nav{
  width:240px;flex-shrink:0;
  background:#131313;
  border-right:1px solid #252525;
  display:flex;flex-direction:column;
}
#nav-hdr{
  padding:16px 16px 12px;
  border-bottom:1px solid #222;
  flex-shrink:0;
}
#nav-hdr .logo{
  font-size:9px;color:#ff4a16;letter-spacing:3px;font-weight:700;
  margin-bottom:4px;
}
#nav-hdr .sub{
  font-size:10px;color:#444;letter-spacing:1px;
}
#nav-list{
  flex:1;overflow-y:auto;padding:6px 0;
}
#nav-list::-webkit-scrollbar{width:3px;}
#nav-list::-webkit-scrollbar-track{background:#111;}
#nav-list::-webkit-scrollbar-thumb{background:#2a2a2a;}

.sep{
  font-size:9px;color:#2d2d2d;letter-spacing:2px;
  padding:12px 16px 4px;text-transform:uppercase;
  border-top:1px solid #1a1a1a;margin-top:4px;
}
.sep:first-child{border-top:none;margin-top:0;}

.nb{
  display:block;width:100%;text-align:left;
  font-size:11px;padding:7px 16px;
  background:none;border:none;
  color:#484848;cursor:pointer;
  letter-spacing:.3px;
  border-left:3px solid transparent;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  transition:color .1s,background .1s;
}
.nb:hover{color:#aaa;background:rgba(255,255,255,.04);}
.nb.on{
  color:#111 !important;
  background:var(--c);
  border-left-color:color-mix(in srgb,var(--c) 60%,#000);
  font-weight:700;
}

/* ── 메인 영역 ── */
#main{flex:1;display:flex;flex-direction:column;min-width:0;background:#0e0e0e;}

/* 상단 헤더 */
#hdr{
  height:44px;flex-shrink:0;
  background:#131313;
  border-bottom:1px solid #222;
  display:flex;align-items:center;
  padding:0 20px;gap:16px;
}
#hdr-panel{
  font-size:14px;font-weight:700;color:#ff4a16;
  letter-spacing:2px;
}
#hdr-sel{
  font-size:10px;color:#333;letter-spacing:.5px;
}
#hdr-hint{
  margin-left:auto;font-size:9px;color:#282828;letter-spacing:.5px;
}

/* 뷰 */
#view{
  flex:1;overflow:auto;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  background:#0a0a0a;
  padding:28px;
}
#view::-webkit-scrollbar{width:6px;height:6px;}
#view::-webkit-scrollbar-track{background:#0a0a0a;}
#view::-webkit-scrollbar-thumb{background:#252525;border-radius:3px;}

/* 와이어프레임 캔버스 */
#wf-canvas{
  position:relative;
  background:#0d0d0d;
  box-shadow:0 0 0 1px #252525, 0 16px 64px rgba(0,0,0,.95);
  flex-shrink:0;
}

/* ── 어노테이션 박스 ── */
.ab{
  position:absolute;box-sizing:border-box;
  border:var(--bw) solid var(--c);
  opacity:var(--op);
  cursor:default;
  transition:opacity .12s;
}
.ab:hover{
  opacity:1 !important;
  z-index:99999 !important;
  border-width:2px !important;
}
.ab-lbl{
  position:absolute;top:0;left:0;
  font-family:'Courier New',monospace;
  font-size:var(--fs);font-weight:700;
  letter-spacing:.2px;
  padding:0 5px;line-height:16px;
  background:var(--c);color:#000;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  max-width:var(--mxw);
  pointer-events:none;
  border-bottom-right-radius:2px;
}
.ab:hover .ab-lbl{
  max-width:none !important;
  font-size:11px !important;
  line-height:18px !important;
  padding:0 7px !important;
  z-index:99999;
}
.ab.hid{border-style:dashed;border-width:1px !important;}
.ab.hid .ab-lbl{opacity:.6;font-style:italic;}

/* ── 하단 컨트롤 바 ── */
#ftr{
  height:44px;flex-shrink:0;
  background:#131313;
  border-top:1px solid #222;
  display:flex;align-items:center;
  gap:14px;padding:0 20px;
}
.ftr-lbl{font-size:10px;color:#3a3a3a;letter-spacing:.5px;}
#depth-slider{
  width:110px;accent-color:#ff4a16;cursor:pointer;
  height:3px;
}
#depth-num{
  font-size:11px;font-weight:700;color:#ff4a16;
  min-width:28px;letter-spacing:.5px;
}
.tog{
  font-family:'Courier New',monospace;
  font-size:9px;font-weight:700;
  padding:4px 12px;cursor:pointer;
  border:1px solid #252525;
  background:#111;color:#3a3a3a;
  letter-spacing:.5px;border-radius:2px;
  transition:all .1s;
}
.tog:hover{border-color:#3a3a3a;color:#666;}
.tog.on{background:var(--tc);color:#000;border-color:var(--tc);}
#el-count{
  margin-left:auto;
  font-size:10px;color:#2a2a2a;letter-spacing:.5px;
}
#scale-info{
  font-size:9px;color:#252525;letter-spacing:.3px;
}
</style>
</head>
<body>

<!-- 숨겨진 DOM 소스 (1400×900 고정, sandbox로 격리) -->
<iframe id="src" src="set-os.html"
  style="position:fixed;left:-9999px;top:0;width:1400px;height:900px;border:none;visibility:hidden;"
  sandbox="allow-scripts allow-same-origin"></iframe>

<div id="frame">

  <!-- ── 사이드바 ── -->
  <div id="nav">
    <div id="nav-hdr">
      <div class="logo">▶ SET-OS</div>
      <div class="sub">WIREFRAME REF</div>
    </div>
    <div id="nav-list">

      <div class="sep">Structure</div>
      <button class="nb" data-sel="#shell"  data-name="Shell"  style="--c:#ff4a16">div#shell</button>
      <button class="nb" data-sel="#wrap"   data-name="#wrap"  style="--c:#ff4a16">div#wrap</button>

      <div class="sep">Left Rail</div>
      <button class="nb" data-sel=".lr-rail"                      data-name="aside.lr-rail"  style="--c:#4ecdc4">aside.lr-rail</button>
      <button class="nb" data-sel=".lr-rail .lr-dp:nth-child(1)"  data-name="F.01 SET MAP"   style="--c:#4ecdc4">F.01 SET MAP</button>
      <button class="nb" data-sel=".lr-rail .lr-dp:nth-child(2)"  data-name="F.02 CONTOUR"   style="--c:#4ecdc4">F.02 CONTOUR</button>
      <button class="nb" data-sel=".lr-rail .lr-dp:nth-child(3)"  data-name="F.03 DATA"      style="--c:#4ecdc4">F.03 DATA</button>

      <div class="sep">Top Row</div>
      <button class="nb" data-sel="#top-row"                     data-name="#top-row"       style="--c:#f7dc6f">#top-row</button>
      <button class="nb" data-sel="#top-row>.pnl:nth-child(1)"   data-name="SET.VIEW"       style="--c:#bb8fce">SET.VIEW</button>
      <button class="nb" data-sel="#top-row>.pnl:nth-child(2)"   data-name="HUD.XT2"        style="--c:#bb8fce">HUD.XT2</button>
      <button class="nb" data-sel="#top-row>.pnl:nth-child(3)"   data-name="UP / EXIT / DOWN" style="--c:#85c1e9">UP / EXIT / DOWN</button>
      <button class="nb" data-sel="#gbar"                        data-name="GBAR"           style="--c:#a8e6cf">div#gbar</button>

      <div class="sep">Bot Row</div>
      <button class="nb" data-sel="#bot-row"                     data-name="#bot-row"       style="--c:#f7dc6f">#bot-row</button>
      <button class="nb" data-sel=".bot-left"                    data-name=".bot-left"      style="--c:#f0b27a">.bot-left</button>
      <button class="nb" data-sel=".bl-split>.pnl:nth-child(1)"  data-name="SYSTEM NOTICE"  style="--c:#f9e79f">SYSTEM NOTICE</button>
      <button class="nb" data-sel=".bl-split>.pnl:nth-child(2)"  data-name="VIEWER_LOG"     style="--c:#f9e79f">VIEWER_LOG</button>
      <button class="nb" data-sel=".bot-left>.pnl:nth-child(1)"  data-name="ID CARD"        style="--c:#abebc6">ID CARD</button>
      <button class="nb" data-sel=".bot-left>.pnl:nth-child(2)"  data-name="WORK.STATUS"    style="--c:#abebc6">WORK.STATUS</button>
      <button class="nb" data-sel="#bot-row>.pnl"                data-name="SET.TEXT"       style="--c:#bb8fce">SET.TEXT</button>

      <div class="sep">Right Rail</div>
      <button class="nb" data-sel=".rr-rail"                     data-name="aside.rr-rail"  style="--c:#4ecdc4">aside.rr-rail</button>
      <button class="nb" data-sel=".rr-rail .lr-dp:nth-child(1)" data-name="F.04 SVA RADAR" style="--c:#4ecdc4">F.04 SVA RADAR</button>
      <button class="nb" data-sel=".rr-rail .lr-dp:nth-child(2)" data-name="F.04 ANALYSIS"  style="--c:#4ecdc4">F.04 ANALYSIS</button>
      <button class="nb" data-sel=".pilot-pnl"                   data-name="SET-NULL.CH"    style="--c:#f1948a">SET-NULL.CHANNEL</button>

      <div class="sep">Status / Overlay</div>
      <button class="nb" data-sel="#mode-row" data-name="#mode-row" style="--c:#85c1e9">#mode-row</button>
      <button class="nb" data-sel="#bg"       data-name="div#bg"    style="--c:#555">div#bg</button>
      <button class="nb" data-sel=".crt"      data-name="div.crt"   style="--c:#444">div.crt</button>

    </div>
  </div>

  <!-- ── 메인 ── -->
  <div id="main">

    <div id="hdr">
      <span id="hdr-panel">— SELECT PANEL —</span>
      <span id="hdr-sel"></span>
      <span id="hdr-hint">hover box = full label · dashed = hidden</span>
    </div>

    <div id="view">
      <div id="wf-canvas"></div>
    </div>

    <div id="ftr">
      <span class="ftr-lbl">DEPTH</span>
      <input id="depth-slider" type="range" min="0" max="12" value="4">
      <span id="depth-num">4</span>
      <button class="tog on" id="tog-vis" style="--tc:#4ecdc4">VISIBLE</button>
      <button class="tog on" id="tog-hid" style="--tc:#888">HIDDEN</button>
      <span id="scale-info"></span>
      <span id="el-count">—</span>
    </div>

  </div>
</div>

<script>
const srcFrame = document.getElementById('src');
const canvas   = document.getElementById('wf-canvas');
const view     = document.getElementById('view');
const hdrPanel = document.getElementById('hdr-panel');
const hdrSel   = document.getElementById('hdr-sel');
const elCount  = document.getElementById('el-count');
const scaleInfo= document.getElementById('scale-info');

const COLORS = [
  '#ff4a16','#f7dc6f','#4ecdc4','#bb8fce',
  '#85c1e9','#f0b27a','#abebc6','#f1948a',
  '#d2b4de','#a9cce3','#a9dfbf','#f9e79f',
  '#eb984e','#76d7c4','#7fb3d3','#c39bd3'
];
const SKIP = new Set([
  'SCRIPT','STYLE','META','LINK','BR','HR',
  'SVG','PATH','G','CIRCLE','LINE','RECT','DEFS',
  'POLYLINE','POLYGON','ELLIPSE','ANIMATE','TEXT','TSPAN','USE'
]);

let allResults = [];
let maxDepth   = 4;
let showVis    = true;
let showHid    = true;

// ── DOM 읽기 ──
function getLabel(el){
  const id  = el.id ? `#${el.id}` : '';
  const cls = Array.from(el.classList)
    .filter(c => !['wfa','wfa-h'].includes(c))
    .slice(0,3).join('.');
  return `${el.tagName.toLowerCase()}${id}${cls ? '.'+cls : ''}`;
}
function isHid(el, win){
  const cs = win.getComputedStyle(el);
  return cs.display==='none' || cs.visibility==='hidden' || parseFloat(cs.opacity)===0;
}
function forceRect(el, win){
  const hidden = isHid(el, win);
  if(hidden){
    el.style.setProperty('display','block','important');
    el.style.setProperty('visibility','visible','important');
    el.style.setProperty('opacity','1','important');
  }
  const r = el.getBoundingClientRect();
  if(hidden){
    el.style.removeProperty('display');
    el.style.removeProperty('visibility');
    el.style.removeProperty('opacity');
  }
  return {r, hidden};
}
function walk(el, depth, origin, win, out){
  if(SKIP.has(el.tagName)) return;
  const hasId  = el.id && el.id.trim().length > 0;
  const hasCls = Array.from(el.classList).some(c => !['wfa','wfa-h'].includes(c));
  if(!hasId && !hasCls){
    Array.from(el.children).forEach(c => walk(c, depth+1, origin, win, out));
    return;
  }
  const {r, hidden} = forceRect(el, win);
  if(r.width > 0 && r.height > 0){
    out.push({
      label: getLabel(el), depth, hidden,
      x: r.left - origin.left,
      y: r.top  - origin.top,
      w: r.width, h: r.height
    });
  }
  Array.from(el.children).forEach(c => walk(c, depth+1, origin, win, out));
}

// ── 렌더 ──
function render(){
  canvas.innerHTML = '';

  if(!allResults.length) return;

  // depth 기준 bounds 계산 (깊은 row 요소가 scale 줄이지 않도록)
  const bounded = allResults.filter(r => r.depth <= maxDepth);
  const pool    = bounded.length ? bounded : allResults;

  let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
  pool.forEach(({x,y,w,h}) => {
    minX=Math.min(minX,x); minY=Math.min(minY,y);
    maxX=Math.max(maxX,x+w); maxY=Math.max(maxY,y+h);
  });

  const pw = maxX - minX;
  const ph = maxY - minY;

  // view 크기에서 패딩 제외
  const vw = view.clientWidth  - 56;
  const vh = view.clientHeight - 56;
  const scale = Math.min(vw / pw, vh / ph, 4);

  canvas.style.width  = Math.round(pw * scale) + 'px';
  canvas.style.height = Math.round(ph * scale) + 'px';
  scaleInfo.textContent = `×${scale.toFixed(2)}`;

  allResults.forEach(({label, depth, hidden, x, y, w, h}) => {
    const color = COLORS[depth % COLORS.length];
    const cx = (x - minX) * scale;
    const cy = (y - minY) * scale;
    const cw = w * scale;
    const ch = h * scale;

    // depth별 스타일
    const bw = depth === 0 ? '2.5px'
             : depth <= 2  ? '2px'
             :                '1.5px';
    const op = Math.max(0.18, 1 - depth * 0.08).toFixed(2);

    // 라벨: 박스가 일정 크기 이상일 때만 표시
    const showLbl = cw >= 50 && ch >= 16;
    const fs = depth === 0 ? '12px'
             : depth <= 1  ? '11px'
             : depth <= 3  ? '10px'
             :                '9px';
    const mxw = Math.round(cw * 0.95) + 'px';

    const box = document.createElement('div');
    box.className = 'ab' + (hidden ? ' hid' : '');
    box.dataset.depth = depth;
    box.dataset.hid   = hidden ? '1' : '0';
    box.style.cssText = [
      `--c:${color}`, `--bw:${bw}`, `--op:${op}`, `--fs:${fs}`, `--mxw:${mxw}`,
      `left:${cx}px`, `top:${cy}px`, `width:${cw}px`, `height:${ch}px`,
      `z-index:${500 - depth}`
    ].join(';');

    if(showLbl){
      const lbl = document.createElement('div');
      lbl.className  = 'ab-lbl';
      lbl.textContent = label;
      box.appendChild(lbl);
    }
    box.title = `[d${depth}] ${label}  (${Math.round(w)}×${Math.round(h)})`;
    canvas.appendChild(box);
  });

  applyFilters();
}

function applyFilters(){
  let shown = 0;
  canvas.querySelectorAll('.ab').forEach(el => {
    const d   = parseInt(el.dataset.depth || 0);
    const hid = el.dataset.hid === '1';
    const vis = d <= maxDepth && (hid ? showHid : showVis);
    el.style.display = vis ? '' : 'none';
    if(vis) shown++;
  });
  document.getElementById('depth-num').textContent =
    maxDepth >= 12 ? 'ALL' : String(maxDepth);
  elCount.textContent = `${shown} els`;
}

// ── 패널 선택 ──
function selectPanel(sel, name){
  const doc = srcFrame.contentDocument;
  const win = srcFrame.contentWindow;
  if(!doc){ hdrPanel.textContent = 'LOADING…'; return; }

  const root = doc.querySelector(sel);
  if(!root){ hdrPanel.textContent = 'NOT FOUND: ' + sel; return; }

  const rr = root.getBoundingClientRect();
  allResults = [];
  walk(root, 0, rr, win, allResults);

  hdrPanel.textContent = name;
  hdrSel.textContent   = sel;
  render();
}

// ── 컨트롤 ──
document.getElementById('depth-slider').addEventListener('input', function(){
  maxDepth = parseInt(this.value);
  render();
});
document.getElementById('tog-vis').addEventListener('click', function(){
  showVis = !showVis;
  this.classList.toggle('on', showVis);
  applyFilters();
});
document.getElementById('tog-hid').addEventListener('click', function(){
  showHid = !showHid;
  this.classList.toggle('on', showHid);
  applyFilters();
});
document.querySelectorAll('.nb').forEach(btn => {
  btn.addEventListener('click', function(){
    document.querySelectorAll('.nb').forEach(b => b.classList.remove('on'));
    this.classList.add('on');
    selectPanel(this.dataset.sel, this.dataset.name);
  });
});

// ── 로드 후 기본 패널 ──
srcFrame.addEventListener('load', () => {
  setTimeout(() => {
    document.querySelector('.nb[data-sel="#wrap"]').click();
  }, 1500);
});
</script>
</body>
</html>
