<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SET-OS — Wireframe Reference</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  width:100%;height:100%;
  background:#0d0d0d;
  font-family:'Courier New',monospace;
  color:#ccc;
  overflow:hidden;
}

/* ── 전체 프레임 (88% 중앙) ── */
#frame{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:90%;height:90%;
  display:flex;
  border:1px solid #2a2a2a;
  border-radius:3px;
  overflow:hidden;
  box-shadow:0 0 0 1px #181818, 0 24px 80px rgba(0,0,0,.9);
}

/* ── 사이드바 ── */
#nav{
  width:240px;flex-shrink:0;
  background:#111;
  border-right:1px solid #222;
  display:flex;flex-direction:column;
  z-index:10;
}
#nav-hdr{
  padding:14px 16px 11px;
  border-bottom:1px solid #1e1e1e;
  flex-shrink:0;
}
.logo{font-size:9px;color:#ff4a16;letter-spacing:3px;font-weight:700;margin-bottom:3px;}
.sub{font-size:10px;color:#383838;letter-spacing:1px;}

#nav-list{flex:1;overflow-y:auto;padding:4px 0;}
#nav-list::-webkit-scrollbar{width:3px;}
#nav-list::-webkit-scrollbar-thumb{background:#252525;}

.sep{
  font-size:8.5px;color:#272727;letter-spacing:2px;
  padding:10px 16px 3px;text-transform:uppercase;
  border-top:1px solid #191919;margin-top:2px;
}
.sep:first-child{border-top:none;margin-top:0;}
.nb{
  display:block;width:100%;text-align:left;
  font-size:11px;padding:7px 16px;
  background:none;border:none;
  color:#404040;cursor:pointer;
  letter-spacing:.3px;
  border-left:3px solid transparent;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  transition:color .1s,background .1s;
}
.nb:hover{color:#aaa;background:rgba(255,255,255,.04);}
.nb.on{color:#000 !important;background:var(--c);border-left-color:color-mix(in srgb,var(--c) 60%,#000);font-weight:700;}

/* ── 메인 ── */
#main{flex:1;display:flex;flex-direction:column;min-width:0;background:#0c0c0c;}

#hdr{
  height:42px;flex-shrink:0;
  background:#111;border-bottom:1px solid #1e1e1e;
  display:flex;align-items:center;padding:0 18px;gap:14px;
}
#hdr-panel{font-size:14px;font-weight:700;color:#ff4a16;letter-spacing:2px;}
#hdr-sel{font-size:10px;color:#2e2e2e;letter-spacing:.5px;}
#hdr-hint{margin-left:auto;font-size:9px;color:#252525;letter-spacing:.5px;}

/* 뷰 — 스크롤 가능 */
#view{
  flex:1;overflow:auto;
  display:flex;align-items:flex-start;justify-content:center;
  background:#090909;
  padding:24px;
}
#view::-webkit-scrollbar{width:5px;height:5px;}
#view::-webkit-scrollbar-thumb{background:#222;border-radius:2px;}

/* 페이지 + 어노테이션 래퍼 */
#wf-wrap{
  position:relative;
  flex-shrink:0;
  /* js로 크기 설정됨 */
}

/* 실제 페이지 iframe (배경) */
#page-bg{
  position:absolute;top:0;left:0;
  width:1400px;height:900px;
  border:none;
  transform-origin:0 0;
  pointer-events:none;
  /* js로 transform:scale() 설정 */
}

/* 어노테이션 오버레이 */
#wf-canvas{
  position:absolute;top:0;left:0;
  pointer-events:auto;
  /* js로 width/height 설정 */
}

/* ── 어노테이션 박스 ── */
.ab{
  position:absolute;box-sizing:border-box;
  border:var(--bw) solid var(--c);
  opacity:var(--op);
  cursor:default;
  transition:opacity .12s;
}
.ab:hover{
  opacity:1 !important;
  z-index:99999 !important;
  border-width:2px !important;
  background:rgba(0,0,0,.18) !important;
}
.ab-lbl{
  position:absolute;top:0;left:0;
  font-family:'Courier New',monospace;
  font-size:var(--fs);font-weight:700;
  letter-spacing:.2px;
  padding:0 5px;line-height:16px;
  background:var(--c);color:#000;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  max-width:var(--mxw);
  pointer-events:none;
  border-bottom-right-radius:2px;
  opacity:.92;
}
.ab:hover .ab-lbl{
  max-width:none !important;
  font-size:11px !important;
  line-height:18px !important;
  padding:0 7px !important;
  opacity:1 !important;
  z-index:99999;
}
.ab.hid{border-style:dashed;}
.ab.hid .ab-lbl{opacity:.55;font-style:italic;}

/* 선택 패널 외 dim 처리 */
.ab.dim{opacity:.08 !important;}
.ab.dim .ab-lbl{display:none;}

/* ── 하단 바 ── */
#ftr{
  height:42px;flex-shrink:0;
  background:#111;border-top:1px solid #1e1e1e;
  display:flex;align-items:center;gap:14px;padding:0 18px;
}
.ftr-lbl{font-size:10px;color:#333;letter-spacing:.5px;}
#depth-slider{width:110px;accent-color:#ff4a16;cursor:pointer;}
#depth-num{font-size:11px;font-weight:700;color:#ff4a16;min-width:28px;}
.tog{
  font-family:'Courier New',monospace;
  font-size:9px;font-weight:700;
  padding:4px 12px;cursor:pointer;
  border:1px solid #222;background:#0d0d0d;color:#383838;
  letter-spacing:.5px;border-radius:2px;transition:all .1s;
}
.tog:hover{border-color:#383838;color:#666;}
.tog.on{background:var(--tc);color:#000;border-color:var(--tc);}
#ann-opacity-wrap{display:flex;align-items:center;gap:6px;}
#ann-opacity{width:70px;accent-color:#888;cursor:pointer;}
#el-count{margin-left:auto;font-size:10px;color:#252525;letter-spacing:.5px;}
#scale-info{font-size:9px;color:#222;letter-spacing:.3px;}

/* 로딩 메시지 */
#loading{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:11px;color:#333;letter-spacing:2px;
  pointer-events:none;
}
</style>
</head>
<body>

<div id="frame">

  <!-- ── 사이드바 ── -->
  <div id="nav">
    <div id="nav-hdr">
      <div class="logo">▶ SET-OS</div>
      <div class="sub">WIREFRAME REF</div>
    </div>
    <div id="nav-list">

      <div class="sep">Structure</div>
      <button class="nb" data-sel="#wrap"   data-name="#wrap"  style="--c:#ff4a16">div#wrap  (전체)</button>

      <div class="sep">Left Rail</div>
      <button class="nb" data-sel=".lr-rail"                      data-name="aside.lr-rail"  style="--c:#4ecdc4">aside.lr-rail</button>
      <button class="nb" data-sel=".lr-rail .lr-dp:nth-child(1)"  data-name="F.01 SET MAP"   style="--c:#4ecdc4">F.01 SET MAP</button>
      <button class="nb" data-sel=".lr-rail .lr-dp:nth-child(2)"  data-name="F.02 CONTOUR"   style="--c:#4ecdc4">F.02 CONTOUR</button>
      <button class="nb" data-sel=".lr-rail .lr-dp:nth-child(3)"  data-name="F.03 DATA"      style="--c:#4ecdc4">F.03 DATA</button>

      <div class="sep">Top Row</div>
      <button class="nb" data-sel="#top-row"                     data-name="#top-row"         style="--c:#f7dc6f">#top-row</button>
      <button class="nb" data-sel="#top-row>.pnl:nth-child(1)"   data-name="SET.VIEW"         style="--c:#bb8fce">SET.VIEW</button>
      <button class="nb" data-sel="#top-row>.pnl:nth-child(2)"   data-name="HUD.XT2"          style="--c:#bb8fce">HUD.XT2</button>
      <button class="nb" data-sel="#top-row>.pnl:nth-child(3)"   data-name="UP / EXIT / DOWN" style="--c:#85c1e9">UP / EXIT / DOWN</button>
      <button class="nb" data-sel="#gbar"                        data-name="GBAR"             style="--c:#a8e6cf">div#gbar</button>

      <div class="sep">Bot Row</div>
      <button class="nb" data-sel="#bot-row"                     data-name="#bot-row"         style="--c:#f7dc6f">#bot-row</button>
      <button class="nb" data-sel=".bot-left"                    data-name=".bot-left"        style="--c:#f0b27a">.bot-left</button>
      <button class="nb" data-sel=".bl-split>.pnl:nth-child(1)"  data-name="SYSTEM NOTICE"    style="--c:#f9e79f">SYSTEM NOTICE</button>
      <button class="nb" data-sel=".bl-split>.pnl:nth-child(2)"  data-name="VIEWER_LOG"       style="--c:#f9e79f">VIEWER_LOG</button>
      <button class="nb" data-sel=".bot-left>.pnl:nth-child(1)"  data-name="ID CARD"          style="--c:#abebc6">ID CARD</button>
      <button class="nb" data-sel=".bot-left>.pnl:nth-child(2)"  data-name="WORK.STATUS"      style="--c:#abebc6">WORK.STATUS</button>
      <button class="nb" data-sel="#bot-row>.pnl"                data-name="SET.TEXT"         style="--c:#bb8fce">SET.TEXT</button>

      <div class="sep">Right Rail</div>
      <button class="nb" data-sel=".rr-rail"                     data-name="aside.rr-rail"    style="--c:#4ecdc4">aside.rr-rail</button>
      <button class="nb" data-sel=".rr-rail .lr-dp:nth-child(1)" data-name="F.04 SVA RADAR"   style="--c:#4ecdc4">F.04 SVA RADAR</button>
      <button class="nb" data-sel=".rr-rail .lr-dp:nth-child(2)" data-name="F.04 ANALYSIS"    style="--c:#4ecdc4">F.04 ANALYSIS</button>
      <button class="nb" data-sel=".pilot-pnl"                   data-name="SET-NULL.CH"      style="--c:#f1948a">SET-NULL.CHANNEL</button>

      <div class="sep">Status / Overlay</div>
      <button class="nb" data-sel="#mode-row" data-name="#mode-row" style="--c:#85c1e9">#mode-row</button>
      <button class="nb" data-sel="#bg"       data-name="div#bg"    style="--c:#555">div#bg</button>
      <button class="nb" data-sel=".crt"      data-name="div.crt"   style="--c:#444">div.crt</button>

    </div>
  </div>

  <!-- ── 메인 ── -->
  <div id="main">

    <div id="hdr">
      <span id="hdr-panel">LOADING…</span>
      <span id="hdr-sel"></span>
      <span id="hdr-hint">hover = full label · dashed = hidden · 클릭 = 패널 강조</span>
    </div>

    <div id="view">
      <div id="wf-wrap">
        <span id="loading">SET-OS 로딩 중…</span>
        <!-- 실제 페이지 배경 (JS 없이 CSS만 렌더) -->
        <iframe id="page-bg" src="set-os.html"
          sandbox="allow-same-origin"></iframe>
        <!-- 어노테이션 오버레이 -->
        <div id="wf-canvas"></div>
      </div>
    </div>

    <div id="ftr">
      <span class="ftr-lbl">DEPTH</span>
      <input id="depth-slider" type="range" min="0" max="12" value="4">
      <span id="depth-num">4</span>
      <button class="tog on" id="tog-vis" style="--tc:#4ecdc4">VISIBLE</button>
      <button class="tog on" id="tog-hid" style="--tc:#888">HIDDEN</button>
      <div id="ann-opacity-wrap">
        <span class="ftr-lbl">OVERLAY</span>
        <input id="ann-opacity" type="range" min="10" max="100" value="75">
      </div>
      <span id="scale-info"></span>
      <span id="el-count">—</span>
    </div>

  </div>
</div>

<script>
const pageBg   = document.getElementById('page-bg');
const canvas   = document.getElementById('wf-canvas');
const wfWrap   = document.getElementById('wf-wrap');
const view     = document.getElementById('view');
const hdrPanel = document.getElementById('hdr-panel');
const hdrSel   = document.getElementById('hdr-sel');
const elCount  = document.getElementById('el-count');
const scaleInfo= document.getElementById('scale-info');
const loading  = document.getElementById('loading');

const IFRAME_W = 1400;
const IFRAME_H = 900;

const COLORS = [
  '#ff4a16','#f7dc6f','#4ecdc4','#bb8fce',
  '#85c1e9','#f0b27a','#abebc6','#f1948a',
  '#d2b4de','#a9cce3','#a9dfbf','#f9e79f',
  '#eb984e','#76d7c4','#7fb3d3','#c39bd3'
];
const SKIP = new Set([
  'SCRIPT','STYLE','META','LINK','BR','HR','NOSCRIPT',
  'SVG','PATH','G','CIRCLE','LINE','RECT','DEFS',
  'POLYLINE','POLYGON','ELLIPSE','ANIMATE','TEXT','TSPAN','USE'
]);

let allResults   = [];    // 현재 선택 패널의 elements
let allWrap      = [];    // #wrap 전체 elements (배경 dim용)
let maxDepth     = 4;
let showVis      = true;
let showHid      = true;
let annOpacity   = 0.75;
let curScale     = 1;
let curSel       = null;  // 현재 선택된 selector

// ── DOM 유틸 ──
function getLabel(el){
  const id  = el.id ? `#${el.id}` : '';
  const cls = Array.from(el.classList)
    .filter(c => !['wfa','wfa-h'].includes(c)).slice(0,3).join('.');
  return `${el.tagName.toLowerCase()}${id}${cls ? '.'+cls : ''}`;
}
function isHid(el, win){
  const cs = win.getComputedStyle(el);
  return cs.display==='none' || cs.visibility==='hidden' || parseFloat(cs.opacity)===0;
}
function forceRect(el, win){
  const hidden = isHid(el, win);
  if(hidden){
    el.style.setProperty('display','block','important');
    el.style.setProperty('visibility','visible','important');
    el.style.setProperty('opacity','1','important');
  }
  const r = el.getBoundingClientRect();
  if(hidden){
    el.style.removeProperty('display');
    el.style.removeProperty('visibility');
    el.style.removeProperty('opacity');
  }
  return {r, hidden};
}
function walk(el, depth, origin, win, out, maxD){
  if(depth > (maxD || 99)) return;
  if(SKIP.has(el.tagName)) return;
  const hasId  = el.id && el.id.trim().length > 0;
  const hasCls = Array.from(el.classList).some(c => !['wfa','wfa-h'].includes(c));
  if(!hasId && !hasCls){
    Array.from(el.children).forEach(c => walk(c, depth+1, origin, win, out, maxD));
    return;
  }
  const {r, hidden} = forceRect(el, win);
  if(r.width > 0 && r.height > 0){
    out.push({
      label: getLabel(el), depth, hidden,
      x: r.left - origin.left,
      y: r.top  - origin.top,
      w: r.width, h: r.height
    });
  }
  Array.from(el.children).forEach(c => walk(c, depth+1, origin, win, out, maxD));
}

// ── 스케일 계산 ──
function computeScale(){
  const vw = view.clientWidth  - 48;
  const vh = view.clientHeight - 48;
  return Math.min(vw / IFRAME_W, vh / IFRAME_H, 2);
}

// ── 레이아웃 초기화 (iframe 로드 후) ──
function initLayout(){
  curScale = computeScale();
  const w = Math.round(IFRAME_W * curScale);
  const h = Math.round(IFRAME_H * curScale);

  pageBg.style.transform = `scale(${curScale})`;
  wfWrap.style.width  = w + 'px';
  wfWrap.style.height = h + 'px';
  canvas.style.width  = w + 'px';
  canvas.style.height = h + 'px';

  scaleInfo.textContent = `×${curScale.toFixed(2)}`;
  loading.style.display = 'none';
}

// ── 전체 #wrap walk (dim 배경용) ──
function walkWrap(){
  const doc = pageBg.contentDocument;
  const win = pageBg.contentWindow;
  if(!doc) return;
  const root = doc.querySelector('#wrap');
  if(!root) return;
  const rr = root.getBoundingClientRect();
  allWrap = [];
  walk(root, 0, rr, win, allWrap, 3); // 얕게: depth 3까지만
}

// ── 어노테이션 렌더 ──
function render(){
  canvas.innerHTML = '';
  if(!allResults.length) return;

  // depth 기준 bounds
  const pool = allResults.filter(r => r.depth <= maxDepth);
  if(!pool.length) return;

  // 모든 요소를 iframe 좌표계에서 직접 스케일해서 그리기
  // (origin은 selectPanel에서 이미 반영됨)
  allResults.forEach(({label, depth, hidden, x, y, w, h}) => {
    const color = COLORS[depth % COLORS.length];
    const cx = x * curScale;
    const cy = y * curScale;
    const cw = w * curScale;
    const ch = h * curScale;

    const bw = depth === 0 ? '2.5px' : depth <= 2 ? '2px' : '1.5px';

    // 배경 있을 때는 opacity 낮게 — OVERLAY 슬라이더로 조절
    const baseOp = Math.max(0.25, annOpacity - depth * 0.04);
    const op = baseOp.toFixed(2);

    const showLbl = cw >= 44 && ch >= 14;
    const fs = depth === 0 ? '11px' : depth <= 1 ? '10.5px' : depth <= 3 ? '10px' : '9px';
    const mxw = Math.round(cw * 0.95) + 'px';

    const box = document.createElement('div');
    box.className = 'ab' + (hidden ? ' hid' : '');
    box.dataset.depth = depth;
    box.dataset.hid   = hidden ? '1' : '0';
    box.style.cssText = [
      `--c:${color}`,`--bw:${bw}`,`--op:${op}`,`--fs:${fs}`,`--mxw:${mxw}`,
      `left:${cx}px`,`top:${cy}px`,`width:${cw}px`,`height:${ch}px`,
      `z-index:${500 - depth}`
    ].join(';');

    if(showLbl){
      const lbl = document.createElement('div');
      lbl.className   = 'ab-lbl';
      lbl.textContent = label;
      box.appendChild(lbl);
    }
    box.title = `[depth ${depth}] ${label}  (${Math.round(w)} × ${Math.round(h)}px)`;
    canvas.appendChild(box);
  });

  applyFilters();
}

function applyFilters(){
  let shown = 0;
  canvas.querySelectorAll('.ab').forEach(el => {
    const d   = parseInt(el.dataset.depth || 0);
    const hid = el.dataset.hid === '1';
    const vis = d <= maxDepth && (hid ? showHid : showVis);
    el.style.display = vis ? '' : 'none';
    if(vis) shown++;
  });
  document.getElementById('depth-num').textContent =
    maxDepth >= 12 ? 'ALL' : String(maxDepth);
  elCount.textContent = `${shown} els`;
}

// ── 패널 선택 ──
function selectPanel(sel, name){
  const doc = pageBg.contentDocument;
  const win = pageBg.contentWindow;
  if(!doc){ hdrPanel.textContent = 'LOADING…'; return; }

  const root = doc.querySelector(sel);
  if(!root){ hdrPanel.textContent = 'NOT FOUND: ' + sel; return; }

  curSel = sel;
  const rr = root.getBoundingClientRect();

  allResults = [];
  // #wrap 기준 origin 사용 (전체 페이지 좌표에서 위치 유지)
  const wrapEl = doc.querySelector('#wrap') || doc.body;
  const wrapRR = wrapEl.getBoundingClientRect();
  walk(root, 0, wrapRR, win, allResults);

  hdrPanel.textContent = name;
  hdrSel.textContent   = sel;
  render();
}

// ── 컨트롤 ──
document.getElementById('depth-slider').addEventListener('input', function(){
  maxDepth = parseInt(this.value);
  render();
});
document.getElementById('tog-vis').addEventListener('click', function(){
  showVis = !showVis; this.classList.toggle('on', showVis); applyFilters();
});
document.getElementById('tog-hid').addEventListener('click', function(){
  showHid = !showHid; this.classList.toggle('on', showHid); applyFilters();
});
document.getElementById('ann-opacity').addEventListener('input', function(){
  annOpacity = parseInt(this.value) / 100;
  // 기존 박스 opacity 일괄 업데이트
  canvas.querySelectorAll('.ab').forEach(el => {
    const d = parseInt(el.dataset.depth || 0);
    const op = Math.max(0.2, annOpacity - d * 0.04).toFixed(2);
    el.style.setProperty('--op', op);
  });
});
document.querySelectorAll('.nb').forEach(btn => {
  btn.addEventListener('click', function(){
    document.querySelectorAll('.nb').forEach(b => b.classList.remove('on'));
    this.classList.add('on');
    selectPanel(this.dataset.sel, this.dataset.name);
  });
});

// ── iframe 로드 ──
pageBg.addEventListener('load', () => {
  initLayout();
  setTimeout(() => {
    walkWrap();
    // 기본: 전체 #wrap 표시
    document.querySelector('.nb[data-sel="#wrap"]').click();
  }, 800);
});

// 창 크기 변경 시 재스케일
window.addEventListener('resize', () => {
  if(!pageBg.contentDocument) return;
  initLayout();
  if(curSel) selectPanel(curSel, hdrPanel.textContent);
});
</script>
</body>
</html>
