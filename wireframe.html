<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SET-OS — Wireframe Full</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;}
#frame{width:100%;height:100%;border:none;display:block;}
#wf-toggle{
  position:fixed;bottom:12px;right:12px;z-index:9999999;
  display:flex;gap:6px;flex-direction:column;align-items:flex-end;
}
#wf-toggle button{
  font-family:'Courier New',monospace;font-size:9px;font-weight:700;
  padding:4px 8px;cursor:pointer;border:1px solid #555;background:#111;color:#aaa;
  letter-spacing:1px;
}
#wf-toggle button.on{background:#ff4a16;color:#000;border-color:#ff4a16;}
</style>
</head>
<body>
<iframe id="frame" src="set-os.html"></iframe>

<div id="wf-toggle">
  <button id="btn-all"  class="on">ALL</button>
  <button id="btn-hidden">HIDDEN</button>
  <button id="btn-visible">VISIBLE</button>
</div>

<script>
const frame = document.getElementById('frame');

// 깊이별 색상
const DEPTH_COLORS = [
  '#ff4a16','#f7dc6f','#4ecdc4','#bb8fce',
  '#85c1e9','#f0b27a','#abebc6','#f1948a',
  '#d2b4de','#a9cce3','#a9dfbf','#f9e79f'
];

frame.addEventListener('load', function(){
  const doc = this.contentDocument;
  if(!doc) return;

  setTimeout(function(){

    // ── 스타일 주입 ──
    const style = doc.createElement('style');
    style.id = 'wf-style';
    style.textContent = `
      .wfa, .wfa-h {
        position:fixed;pointer-events:none;box-sizing:border-box;z-index:999990;
      }
      .wfa   { outline:1px solid var(--wfc); outline-offset:-1px; }
      .wfa-h { outline:1px dashed var(--wfc); outline-offset:-1px; background:rgba(0,0,0,.4); }
      .wfa::before, .wfa-h::before {
        content:attr(data-label);
        position:absolute;top:0;left:0;
        font-family:'Courier New',monospace;
        font-size:7.5px;font-weight:700;letter-spacing:.4px;
        padding:0px 4px;line-height:14px;
        background:var(--wfc);color:#000;
        white-space:nowrap;max-width:320px;overflow:hidden;text-overflow:ellipsis;
        opacity:.9;
      }
      .wfa-h::after {
        content:'HIDDEN';
        position:absolute;bottom:1px;right:3px;
        font-family:'Courier New',monospace;font-size:6px;
        color:var(--wfc);opacity:.5;letter-spacing:1px;
      }
      .wf-hidden-all .wfa { display:none !important; }
      .wf-visible-all .wfa-h { display:none !important; }
    `;
    doc.head.appendChild(style);

    const SKIP = new Set(['SCRIPT','STYLE','META','LINK','HEAD','TITLE','BR','HR','INPUT','TEXTAREA','IFRAME','SVG','PATH','G','CIRCLE','LINE','RECT','TEXT','DEFS','POLYLINE','POLYGON','ELLIPSE']);

    function getDepth(el){
      let d=0, cur=el;
      while(cur.parentElement){ d++; cur=cur.parentElement; }
      return d;
    }

    function getLabel(el){
      const id = el.id ? `#${el.id}` : '';
      const cls = el.classList.length
        ? '.' + Array.from(el.classList).filter(c=>!c.startsWith('wf')).join('.')
        : '';
      const tag = el.tagName.toLowerCase();
      return `${tag}${id}${cls}` || tag;
    }

    function forceVisible(el){
      const cs = doc.defaultView.getComputedStyle(el);
      const hidden =
        cs.display === 'none' ||
        cs.visibility === 'hidden' ||
        cs.opacity === '0' ||
        (parseFloat(cs.width) === 0 && parseFloat(cs.height) === 0);
      return hidden;
    }

    function annotateEl(el, depth){
      if(SKIP.has(el.tagName)) return;
      if(el.classList.contains('wfa') || el.classList.contains('wfa-h')) return;

      const label = getLabel(el);
      if(!label || label === 'div' || label === 'span') {
        // id/class 없는 bare div/span은 생략
        const hasId = el.id && el.id.length > 0;
        const hasCls = el.classList.length > 0;
        if(!hasId && !hasCls) return;
      }

      const color = DEPTH_COLORS[depth % DEPTH_COLORS.length];
      const isHidden = forceVisible(el);

      if(isHidden){
        // 강제 표시
        el.style.setProperty('display','block','important');
        el.style.setProperty('visibility','visible','important');
        el.style.setProperty('opacity','1','important');
      }

      const r = el.getBoundingClientRect();

      if(isHidden){
        el.style.removeProperty('display');
        el.style.removeProperty('visibility');
        el.style.removeProperty('opacity');
      }

      if(!r.width || !r.height) return;

      const d = doc.createElement('div');
      d.className = isHidden ? 'wfa-h' : 'wfa';
      d.setAttribute('data-label', label);
      d.style.cssText = `--wfc:${color};left:${r.left}px;top:${r.top}px;width:${r.width}px;height:${r.height}px;z-index:${999990 - depth};`;
      doc.body.appendChild(d);
    }

    // DOM 전체 순회
    function walk(el, depth){
      if(!el) return;
      annotateEl(el, depth);
      Array.from(el.children).forEach(child => walk(child, depth+1));
    }

    // body 직계부터 시작 (head 제외)
    Array.from(doc.body.children).forEach(child => walk(child, 0));

    // ── 외부 토글 버튼 연결 ──
    function setMode(mode){
      doc.body.classList.remove('wf-hidden-all','wf-visible-all');
      document.querySelectorAll('#wf-toggle button').forEach(b=>b.classList.remove('on'));
      if(mode==='hidden'){
        doc.body.classList.add('wf-hidden-all');
        document.getElementById('btn-hidden').classList.add('on');
      } else if(mode==='visible'){
        doc.body.classList.add('wf-visible-all');
        document.getElementById('btn-visible').classList.add('on');
      } else {
        document.getElementById('btn-all').classList.add('on');
      }
    }

    document.getElementById('btn-all').onclick     = ()=>setMode('all');
    document.getElementById('btn-hidden').onclick  = ()=>setMode('hidden');
    document.getElementById('btn-visible').onclick = ()=>setMode('visible');

  }, 1200);
});
</script>
</body>
</html>
