  <style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { background: #000; color: #39dc00; font-family: 'Courier New', monospace; height: 100%; overflow: hidden; }

.top-banner {
  position: fixed; top: 0; left: 0; width: 100%; height: 32px;
  background: #000; border-bottom: 2px dashed #ff3333; color: #ff3333;
  padding: 6px 0; z-index: 999; overflow: hidden;

  font-size: 12px;
}

@keyframes marquee { 0% { text-indent: 100vw; } 100% { text-indent: -150vw; } }

.portfolio-container {
  display: flex;
  justify-content: center;
  align-items: center;
  width: 100%;

  padding: 20px;
  gap: 0;
}

/* ===== MENU SECTION (LEFT) ===== */

.terminal-icon {
  width: 16px;

  background: #39dc00;
  border: 1px solid #000;
  cursor: pointer;
  font-size: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #000;

.terminal-content {

  padding: 12px;
  overflow-y: auto;
  background: #000;
  color: #39dc00;
  font-size: 12px;

.terminal-content-text {

.terminal-statusbar {

/* ===== SCROLLBAR ===== */

}

/* ===== HAMBURGER MENU (MOBILE) ===== */

  position: fixed;
  top: 40px;

  z-index: 1000;
  background: #39dc00;
  border: 2px solid #39dc00;
  color: #000;

  height: 40px;
  cursor: pointer;
  font-size: 24px;

  align-items: center;
  justify-content: center;
}

.hamburger-btn:hover {
  background: #ff9900;
  border-color: #ff9900;

/* ===== MOBILE RESPONSIVE ===== */
@media (max-width: 768px) {
  .portfolio-container {
    gap: 0;
    padding: 0;
    align-items: flex-start;
    justify-content: flex-start;

    max-width: 100%;
    height: calc(100vh - 32px);
    gap: 0;
  }

  .menu-section {
    position: fixed;
    left: -240px;
    top: 32px;
    width: 240px;
    height: calc(100vh - 32px);
    z-index: 500;
    transition: left 0.3s ease;
  }

  .menu-section.mobile-active {
    left: 0;
  }

  .terminal-section {
    width: 100%;
  }

  .hamburger-btn {
    display: flex;
  }

  .terminal-content {
    font-size: 11px;
  }

  .menu-item {
    padding: 10px;
    font-size: 11px;
  }
}

SET IS THE WORLD

A cyberpunk-themed visual and textual exploration of the boundaries between observer and observed, world and self.

CORE CONCEPT:
Instructions, coerced body, suspended gaze. Archiving the structure of photography by halting reproduction.

Set is the world. I'm measuring the perimeter of the set.
But the scale I hold is already contaminated by the world itself.

STRUCTURE:
- 6 distinct sections exploring different aspects of the SET framework
- Terminal-based interface for navigation
- DOS aesthetic as metaphorical framework
- Interactive content loading system

STATUS: ACTIVE
LAST UPDATE: 2026-05-21
==========================================`

    // Initialize content display
    function loadContent(section) {
      const content = contents[section];
      const contentText = document.getElementById('contentText');

      if (content) {
        contentText.textContent = content.text;
      }
    }

    // Menu item click handler
    function setupMenuItems() {
      const menuItems = document.querySelectorAll('.menu-item');

      menuItems.forEach(item => {
        item.addEventListener('click', function() {
          // Update active state
          menuItems.forEach(m => m.classList.remove('active'));
          this.classList.add('active');

          // Load content
          const section = this.getAttribute('data-section');
          loadContent(section);

          // Close menu on mobile
          const menuSection = document.getElementById('menuSection');
          if (window.innerWidth <= 768) {
            menuSection.classList.remove('mobile-active');
          }
        });
      });
    }

    // Hamburger menu toggle
    function setupHamburger() {
      const hamburgerBtn = document.getElementById('hamburgerBtn');
      const menuSection = document.getElementById('menuSection');

      hamburgerBtn.addEventListener('click', function() {
        menuSection.classList.toggle('mobile-active');
      });

      // Close menu on outside click
      document.addEventListener('click', function(e) {
        if (window.innerWidth <= 768) {
          if (!menuSection.contains(e.target) && !hamburgerBtn.contains(e.target)) {
            menuSection.classList.remove('mobile-active');
          }
        }
      });

      // Close menu on ESC key
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
          menuSection.classList.remove('mobile-active');
        }
      });
    }

    // Initialize on page load
    document.addEventListener('DOMContentLoaded', function() {
      setupMenuItems();
      setupHamburger();

      // Load initial content
      loadContent('project');
    });
  </script>
