<!DOCTYPE html><!-- v2 -->
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>WORK.STATUS — SAMPLE</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=VT323&display=swap" rel="stylesheet">
<style>
:root{
  --g:#d96a0e; --g2:rgba(217,106,14,0.7); --g3:rgba(217,106,14,0.4); --g4:rgba(217,106,14,0.14);
  --acc:#ff7e00; --ac4:#3fb09a; --ac5:#b07bff; --ac2:#ff6f61; --ac3:#ffd23d; --pnl:#000000; --bd:#d96a0e; --amb:#ffb000; --red:#ff3b1f; --cy:#ff9040;
  --mono:'IBM Plex Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000000;font-family:var(--mono);}

.feed-wrap{width:100%;height:100%;display:flex;flex-direction:column;background:var(--pnl);position:relative;overflow:hidden;}
.feed-wrap::before{content:'';position:absolute;inset:0;z-index:20;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent 0,transparent 3px,rgba(0,0,0,.05) 3px,rgba(0,0,0,.05) 4px);}

/* header */
.feed-hdr{flex-shrink:0;display:flex;align-items:center;height:22px;background:#000;
  border-bottom:1px solid rgba(217,106,14,.5);padding:0 8px;font-size:9px;color:#d96a0e;letter-spacing:1px;}
.feed-hdr .arr{color:var(--ac3);margin-right:7px;}
.feed-hdr .tag{margin-left:auto;color:var(--g3);font-size:7px;}

/* sub bar */
.feed-sub{flex-shrink:0;display:flex;align-items:center;gap:8px;
  padding:3px 8px;border-bottom:1px solid var(--g4);font-size:6.5px;color:var(--g3);letter-spacing:.5px;}
.feed-sub .live{display:flex;align-items:center;gap:4px;color:var(--ac2);}
.feed-sub .live i{width:5px;height:5px;border-radius:50%;background:var(--ac2);box-shadow:0 0 4px var(--ac2);
  animation:fblink 1s step-end infinite;}
.feed-sub .sp{margin-left:auto;}
@keyframes fblink{0%,100%{opacity:1}50%{opacity:.2}}

/* stats strip */
.f-stats{flex-shrink:0;display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid var(--g4);background:#000;}
.f-stat{padding:3px 7px;display:flex;flex-direction:column;gap:2px;border-right:1px solid rgba(217,106,14,.07);}
.f-stat:last-child{border-right:none;}
.f-stat .k{font-size:5.5px;color:var(--g3);letter-spacing:1px;}
.f-stat .v{font-size:12px;color:var(--g);font-weight:500;line-height:1;}
.f-stat.core .v{color:var(--ac3);} .f-stat.sup .v{color:var(--amb);}
.f-stat.drop .v{color:var(--g3);} .f-stat.q .v{color:var(--ac4);}

/* now processing */
.f-now{flex-shrink:0;padding:5px 8px;border-bottom:1px solid var(--g4);background:rgba(217,106,14,.015);}
.f-now-top{display:flex;align-items:baseline;gap:6px;font-size:7px;}
.f-now-top .lbl{color:var(--ac3);letter-spacing:1px;}
.f-now-top .tgt{color:var(--g2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.f-now-top .pct{margin-left:auto;color:var(--g3);flex-shrink:0;}
.f-now-bar{height:4px;background:rgba(217,106,14,.08);border:1px solid var(--g4);margin-top:4px;overflow:hidden;}
.f-now-bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--acc),var(--ac3));transition:width .35s linear;}

/* throughput sparkline */
.f-spk-wrap{flex-shrink:0;padding:3px 8px 4px;border-bottom:1px solid var(--g4);}
.f-spk-lbl{display:flex;justify-content:space-between;font-size:5.5px;color:var(--g3);letter-spacing:1px;}
.f-spk{display:flex;align-items:flex-end;gap:1px;height:20px;margin-top:3px;}
.f-spk .sb{flex:1;background:rgba(217,106,14,.28);min-height:1px;transition:height .3s ease;}
.f-spk .sb.hi{background:var(--ac3);box-shadow:0 0 4px rgba(255,210,61,.5);}
#spk-peak{color:var(--ac3);} .feed-sub .sp b{color:var(--ac3);} .f-now-top .pct{color:var(--ac3)!important;}

/* list */
.feed-list{flex:1;overflow:hidden;min-height:0;display:flex;flex-direction:column;padding:2px 0;position:relative;z-index:5;}
.frow{display:grid;grid-template-columns:46px 34px 1fr;gap:5px;align-items:baseline;
  padding:2.5px 8px;font-size:8px;border-bottom:1px solid rgba(217,106,14,.05);animation:fslide .3s ease;}
@keyframes fslide{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:none}}
.frow .ft{font-size:7px;color:var(--g3);}
.frow .fy{font-size:6px;letter-spacing:.5px;text-align:center;padding:1px 0;border:1px solid currentColor;line-height:1;}
.frow .fx{color:var(--g);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fy.scan{color:var(--acc);} .fy.cull{color:var(--g2);} .fy.core{color:#000000;background:var(--acc);border-color:var(--acc);}
.fy.drop{color:var(--red);} .fy.tag{color:var(--ac5);} .fy.sync{color:var(--ac4);}

/* footer */
.feed-ftr{flex-shrink:0;display:flex;justify-content:space-between;align-items:center;
  border-top:1px solid var(--g4);padding:4px 8px;font-size:6.5px;color:var(--g3);letter-spacing:.5px;
  position:relative;z-index:5;background:rgba(217,106,14,.02);}
.feed-ftr b{color:var(--ac3);font-weight:400;}
.feed-ftr .cur{color:var(--g2);}
</style>
</head>
<body>
<div class="feed-wrap">
  <div class="feed-hdr">
    <span>WORK TIMELINE</span>
    <span class="tag">작업 현황</span>
  </div>

  <div class="feed-sub">
    <span class="live"><i></i>LIVE</span>
    <span id="f-clk">00:00:00</span>
    <span class="sp">RATE <b id="f-rate">0</b>/min</span>
  </div>

  <div class="f-stats">
    <div class="f-stat core"><span class="k">POSTS</span><span class="v" id="s-core">—</span></div>
    <div class="f-stat sup"><span class="k">COMMITS</span><span class="v" id="s-sup">—</span></div>
    <div class="f-stat drop"><span class="k">THIS WK</span><span class="v" id="s-drop">—</span></div>
    <div class="f-stat q"><span class="k">LAST</span><span class="v" id="s-q">—</span></div>
  </div>

  <div class="f-now">
    <div class="f-now-top">
      <span class="lbl">NOW</span>
      <span class="tgt" id="now-tgt">0345/12 셀렉션 검토</span>
      <span class="pct" id="now-pct">0%</span>
    </div>
    <div class="f-now-bar"><i id="now-bar"></i></div>
  </div>

  <div class="f-spk-wrap">
    <div class="f-spk-lbl"><span>THROUGHPUT</span><span id="spk-peak">peak 0</span></div>
    <div class="f-spk" id="spk"></div>
  </div>

  <div class="feed-list" id="f-list"></div>

  <div class="feed-ftr">
    <span>REPO <span class="cur">note-a/note-a-github</span></span>
    <span>최신 <b id="f-prog">—</b></span>
  </div>
</div>

<script>
(function(){
  const $=id=>document.getElementById(id);
  const p2=n=>String(n).padStart(2,'0');
  const nowT=()=>{const d=new Date();return p2(d.getHours())+':'+p2(d.getMinutes())+':'+p2(d.getSeconds());};

  setInterval(()=>{ $('f-clk').textContent=nowT(); },1000);
  $('f-clk').textContent=nowT();

  // ── 커밋 메시지 분류 ──
  function classify(msg){
    const m=msg.toLowerCase();
    if(/fix|bug|revert|error/.test(m)) return ['drop','FIX'];
    if(/add|feat|new|creat/.test(m))   return ['core','ADD'];
    if(/update|upd|sync|push/.test(m)) return ['sync','UPD'];
    if(/rename|move|refactor/.test(m)) return ['tag','MOV'];
    if(/style|design|css|ui|font/.test(m)) return ['cull','STY'];
    return ['scan','LOG'];
  }

  // ── 시간 경과 표시 ──
  function timeAgo(dateStr){
    const diff=Date.now()-new Date(dateStr).getTime();
    const m=Math.floor(diff/60000);
    if(m<1) return 'just now';
    if(m<60) return m+'m ago';
    const h=Math.floor(m/60);
    if(h<24) return h+'h ago';
    return Math.floor(h/24)+'d ago';
  }

  // ── 스파크라인 ──
  const NB=28; const spk=$('spk'); const sdata=Array(NB).fill(0); const bars=[];
  for(let i=0;i<NB;i++){ const b=document.createElement('div'); b.className='sb'; spk.appendChild(b); bars.push(b); }
  function renderSpark(){
    const mx=Math.max(1,...sdata);
    sdata.forEach((v,i)=>{ bars[i].style.height=Math.max(1,Math.round(v/mx*20))+'px'; bars[i].className='sb'+(i===NB-1?' hi':''); });
    $('spk-peak').textContent='peak '+Math.max(...sdata);
  }
  renderSpark();

  // ── 커밋 피드 렌더 ──
  function renderFeed(commits){
    const list=$('f-list'); list.innerHTML='';
    commits.slice(0,14).forEach((c,i)=>{
      const msg=c.commit.message.split('\n')[0];
      const [cls,lbl]=classify(msg);
      const row=document.createElement('div'); row.className='frow';
      row.style.opacity=Math.max(0.28,1-i*0.06).toFixed(2);
      row.innerHTML='<span class="ft">'+timeAgo(c.commit.author.date)+'</span>'
        +'<span class="fy '+cls+'">'+lbl+'</span>'
        +'<span class="fx">'+msg.slice(0,52)+'</span>';
      list.appendChild(row);
    });
  }

  // ── 데이터 fetch (localStorage 캐시 15분) ──
  const GH='https://api.github.com/repos/note-a/note-a-github/commits?per_page=50';
  const PP='https://raw.githubusercontent.com/note-a/note-a-github/main/published-posts.json';
  const CACHE_TTL=5*60*1000; // 5분

  function getCache(key, ignoreExpiry){
    try{
      const raw=localStorage.getItem(key);
      if(!raw) return null;
      const {ts,data}=JSON.parse(raw);
      if(!ignoreExpiry && Date.now()-ts>CACHE_TTL) return null;
      return data;
    }catch(e){ return null; }
  }
  function setCache(key,data){
    try{ localStorage.setItem(key,JSON.stringify({ts:Date.now(),data})); }catch(e){}
  }

  function fetchWithCache(url,key){
    const cached=getCache(key);
    if(cached) return Promise.resolve(cached);
    return fetch(url).then(r=>r.json()).then(data=>{
      // 레이트리밋·오류 응답이면 만료된 캐시라도 반환
      if(data && data.message && !Array.isArray(data)){
        const stale=getCache(key, true);
        return stale||[];
      }
      setCache(key,data);
      return data;
    }).catch(()=>{
      // 네트워크 오류도 stale 캐시 폴백
      return getCache(key, true)||[];
    });
  }

  Promise.all([
    fetchWithCache(GH,'ws_commits'),
    fetchWithCache(PP,'ws_posts')
  ]).then(([commits, posts])=>{
    if(!Array.isArray(commits)||!commits.length){ $('now-tgt').textContent='GitHub API 대기중'; return; }

    // 스탯
    const now=Date.now(), week=7*24*60*60*1000;
    const rulePosts=(Array.isArray(posts)?posts:[]).filter(p=>p&&p.publishedSection==='rule').length;
    const weekCommits=commits.filter(c=>now-new Date(c.commit.author.date)<week).length;
    const lastDate=new Date(commits[0].commit.author.date);
    $('s-core').textContent=rulePosts;
    $('s-sup').textContent=commits.length;
    $('s-drop').textContent=weekCommits;
    $('s-q').textContent=p2(lastDate.getMonth()+1)+'/'+p2(lastDate.getDate());
    $('f-rate').textContent=weekCommits;
    $('f-prog').textContent=timeAgo(commits[0].commit.author.date);

    // 최신 커밋 → NOW
    const latest=commits[0].commit.message.split('\n')[0];
    $('now-tgt').textContent=latest.slice(0,38);
    const freshPct=Math.max(2,100-Math.min(100,Math.round((now-lastDate.getTime())/week*100)));
    $('now-bar').style.width=freshPct+'%'; $('now-pct').textContent=freshPct+'%';

    // 스파크라인 — 날짜별 커밋 수
    commits.forEach(c=>{
      const daysAgo=Math.floor((now-new Date(c.commit.author.date))/(24*60*60*1000));
      if(daysAgo>=0&&daysAgo<NB) sdata[NB-1-daysAgo]++;
    });
    renderSpark();

    // 피드
    renderFeed(commits);

    // 1분마다 "N ago" 갱신
    setInterval(()=>renderFeed(commits), 60000);
  });
})();
</script>
</body>
</html>
