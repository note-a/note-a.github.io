<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SET - MENU</title>
  <style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { background: #000; color: #39dc00; font-family: 'Courier New', monospace; height: 100%; overflow: hidden; }

.top-banner {
  display: none;
  position: fixed; top: 0; left: 0; width: 100%; height: 32px;
  background: #000; border-bottom: 2px dashed #ff3333; color: #ff3333;
  padding: 6px 0; z-index: 999; overflow: hidden;
  animation: marquee 12s linear infinite;
  font-size: 12px;
}

@keyframes marquee { 0% { text-indent: 100vw; } 100% { text-indent: -150vw; } }

.menu-container {
  display: flex; justify-content: center; align-items: center;
  width: 100%; height: calc(100vh - 32px);
  margin-top: 32px;
  padding: 20px;
}

.folder-window {
  border: 2px solid #39dc00;
  background: #000;
  width: 100%;
  max-width: 700px;
  max-height: 80vh;
  display: flex;
  flex-direction: column;
  box-shadow: 0 0 20px rgba(57, 220, 0, 0.3);
}

.folder-titlebar {
  background: #39dc00;
  color: #000;
  padding: 6px 10px;
  font-weight: bold;
  font-size: 13px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.folder-icons {
  display: flex;
  gap: 4px;
}

.folder-icon {
  width: 16px;
  height: 16px;
  background: #39dc00;
  border: 1px solid #000;
  cursor: pointer;
  font-size: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #000;
}

.folder-content {
  flex: 1;
  padding: 12px;
  overflow-y: auto;
  background: #000;
  color: #39dc00;
  font-size: 12px;
  line-height: 1.8;
  border-top: 1px solid #39dc00;
}

.path-bar {
  padding: 8px 12px;
  border-bottom: 1px solid #39dc00;
  background: #000;
  color: #39dc00;
  font-size: 11px;
  border-top: 1px solid #39dc00;
}

.menu-items {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.menu-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px 12px;
  cursor: pointer;
  transition: all 0.1s;
  border: 2px solid #39dc00;
  background: #000;
  text-align: center;
  min-height: 80px;
}

.menu-item:hover {
  background: #39dc00;
  color: #000;
  border: 1px solid #39dc00;
}

.menu-item-icon {
  margin-bottom: 8px;
  width: 100%;
  text-align: center;
  font-size: 20px;
}

.menu-item-name {
  flex: 1;
  word-break: break-all;
  font-size: 13px;
  font-weight: bold;
}

::-webkit-scrollbar {
  width: 10px;
}

::-webkit-scrollbar-track {
  background: #000;
  border-left: 1px solid #39dc00;
}

::-webkit-scrollbar-thumb {
  background: #39dc00;
}

::-webkit-scrollbar-thumb:hover {
  background: #ff9900;
}

.status-bar {
  padding: 8px 12px;
  border-top: 1px solid #39dc00;
  background: #000;
  color: #39dc00;
  font-size: 11px;
  display: flex;
  justify-content: space-between;
  text-align: center;
}

@media (max-width: 768px) {
  .folder-window {
    max-width: 95vw;
  }

  .folder-content {
    font-size: 11px;
  }

  .menu-item {
    padding: 6px 10px;
  }
}
  </style>
</head>
<body>
  <div class="top-banner">&gt;&gt;&gt; FATAL_BREACH_DETECTED : SYSTEM KERNEL COMPROMISED. DO NOT DISCONNECT. TRACING... &lt;&lt;&lt;</div>

  <div class="menu-container">
    <div class="folder-window">
      <div class="folder-titlebar">
        SET WORLD DIRECTORY
        <div class="folder-icons">
          <div class="folder-icon">_</div>
          <div class="folder-icon">□</div>
          <div class="folder-icon">✕</div>
        </div>
      </div>

      <div class="path-bar">
        C:\WORLD\SET\
      </div>

      <div class="folder-content">
        <div class="menu-items">
          <div class="menu-item" onclick="navigate('portfolio.html')">
            <div class="menu-item-icon">[📁]</div>
            <div class="menu-item-name">Project SET</div>
          </div>
          <div class="menu-item" onclick="navigate('portfolio.html#section1')">
            <div class="menu-item-icon">[📁]</div>
            <div class="menu-item-name">SET Inclusion</div>
          </div>
          <div class="menu-item" onclick="navigate('portfolio.html#section2')">
            <div class="menu-item-icon">[📄]</div>
            <div class="menu-item-name">Intro text</div>
          </div>
          <div class="menu-item" onclick="navigate('portfolio.html#section3')">
            <div class="menu-item-icon">[📋]</div>
            <div class="menu-item-name">rule</div>
          </div>
          <div class="menu-item" onclick="navigate('portfolio.html#section4')">
            <div class="menu-item-icon">[📖]</div>
            <div class="menu-item-name">reference</div>
          </div>
          <div class="menu-item" onclick="navigate('portfolio.html#section5')">
            <div class="menu-item-icon">[📁]</div>
            <div class="menu-item-name">Portfolio</div>
          </div>
          <div class="menu-item" onclick="navigate('portfolio.html#section6')">
            <div class="menu-item-icon">[🎬]</div>
            <div class="menu-item-name">video archive</div>
          </div>
        </div>
      </div>

      <div class="status-bar">
        <span>7 Files</span>
        <span>ENTER to select • ESC to exit</span>
      </div>
    </div>
  </div>

  <script>
    function navigate(path) {
      window.location.href = path;
    }

    // ESC 키로 나가기
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        window.location.href = 'index.html';
      }
    });

    // 엔터 키로 선택된 항목 실행
    let selectedIndex = 0;
    const items = document.querySelectorAll('.menu-item');

    document.addEventListener('keydown', function(e) {
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        selectedIndex = (selectedIndex + 1) % items.length;
        updateSelection();
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        selectedIndex = (selectedIndex - 1 + items.length) % items.length;
        updateSelection();
      } else if (e.key === 'Enter') {
        e.preventDefault();
        items[selectedIndex].click();
      }
    });

    function updateSelection() {
      items.forEach((item, idx) => {
        if (idx === selectedIndex) {
          item.style.background = '#39dc00';
          item.style.color = '#000';
        } else {
          item.style.background = 'transparent';
          item.style.color = '#39dc00';
        }
      });
      items[selectedIndex].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // 초기 선택
    updateSelection();
  </script>
</body>
</html>
